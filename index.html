<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Wordle 💖 | A Sweet Word Game for You</title>
    <meta name="description" content="Play Love Wordle, a sweet and romantic twist on the classic word game. 5 letters, 6 guesses, and infinite love!">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --pink-50: #fff5f8;
            --pink-100: #ffe4ef;
            --pink-200: #ffc9e0;
            --pink-300: #ffa1ca;
            --pink-400: #ff66a4;
            --pink-500: #ff3381;
            --pink-600: #e61a6b;
            --rose: #ff2d75;
            --cream: #fff9fb;
            --white: #ffffff;
            --gray-100: #f7f2f4;
            --gray-300: #d1c1c7;
            --gray-500: #8a767e;
            --green: #4ade80;
            --yellow: #facc15;
            --tile-size: clamp(48px, 12vw, 62px);
            --gap: clamp(4px, 1.5vw, 8px);
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-premium: 0 10px 40px rgba(255, 45, 117, 0.15);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        /* Base Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f6 0%, #ffe3ec 50%, #fff0f6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: var(--gray-500);
            position: relative;
        }

        /* Ambient Hearts */
        .ambient-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .ambient-hearts span {
            position: absolute;
            bottom: -50px;
            opacity: 0;
            animation: floatUp var(--dur) var(--delay) infinite ease-in;
            left: var(--x);
            font-size: var(--size);
            filter: blur(var(--blur));
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.2; }
            100% { transform: translateY(-110vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* Header */
        header {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px 20px;
            text-align: center;
            z-index: 10;
        }
        .logo {
            font-family: 'Pacifico', cursive;
            font-size: clamp(32px, 8vw, 48px);
            background: linear-gradient(135deg, var(--pink-500), var(--rose));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 12px rgba(255, 45, 117, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo i {
            -webkit-text-fill-color: initial;
            color: var(--rose);
            font-size: 0.8em;
        }
        .tagline {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--pink-400);
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Controls */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        .music-btn, .streak-badge {
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 700;
            color: var(--pink-600);
            box-shadow: 0 4px 15px rgba(255, 45, 117, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .music-btn {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .music-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 45, 117, 0.15);
        }
        .music-btn.playing {
            background: var(--pink-100);
            border-color: var(--pink-200);
        }

        /* Main Game Area */
        main {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 10;
        }

        /* Grid */
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: var(--gap);
        }
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--gap);
        }

        /* Tiles */
        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            perspective: 1000px;
        }
        .tile-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .tile.flipped .tile-inner {
            transform: rotateX(180deg);
        }
        .tile-front, .tile-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 900;
            border-radius: var(--radius-md);
            text-transform: uppercase;
        }
        .tile-front {
            background: var(--white);
            border: 2px solid var(--pink-100);
            color: var(--pink-600);
            transition: all 0.1s;
        }
        .tile-front.filled {
            border-color: var(--pink-300);
            transform: scale(1.05);
            animation: pop 0.1s ease;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1.05); }
        }
        .tile-back {
            transform: rotateX(180deg);
            color: white;
        }
        .tile-back.correct { background: linear-gradient(135deg, #10b981, #059669); }
        .tile-back.present { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .tile-back.absent { background: linear-gradient(135deg, #9ca3af, #4b5563); }

        /* Keyboard */
        #keyboard {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }
        .key {
            height: clamp(52px, 8vh, 58px);
            min-width: clamp(30px, 8.5vw, 42px);
            background: var(--white);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: clamp(12px, 3vw, 15px);
            color: var(--gray-500);
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 3px 0 var(--gray-100);
        }
        .key:hover {
            background: var(--pink-50);
            color: var(--pink-500);
            transform: translateY(-2px);
        }
        .key.wide {
            min-width: clamp(50px, 14vw, 65px);
            background: var(--pink-50);
            color: var(--pink-600);
        }
        .key.correct { background: #10b981; color: white; box-shadow: 0 3px 0 #047857; }
        .key.present { background: #f59e0b; color: white; box-shadow: 0 3px 0 #b45309; }
        .key.absent { background: #4b5563; color: white; box-shadow: 0 3px 0 #1f2937; }

        /* Modal */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-card {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-lg);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            transform: scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        #modal.show .modal-card {
            transform: scale(1);
        }
        .modal-icon { color: var(--rose); margin-bottom: 20px; display: flex; justify-content: center; }
        .modal-icon i { width: 64px; height: 64px; }
        .modal-title { font-family: 'Pacifico', cursive; font-size: 32px; color: var(--pink-500); margin-bottom: 12px; }
        .modal-message { font-size: 16px; margin-bottom: 24px; line-height: 1.6; }
        .modal-countdown { font-size: 14px; font-weight: 800; color: var(--pink-400); margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .modal-btn {
            background: linear-gradient(135deg, var(--pink-500), var(--rose));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 117, 0.3);
            transition: all 0.3s;
        }
        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 45, 117, 0.4);
        }

        /* Stats in Modal */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: var(--pink-50);
            padding: 15px;
            border-radius: var(--radius-md);
        }
        .stat-value { font-size: 24px; font-weight: 900; color: var(--rose); }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--gray-500); }

        /* Toast */
        #toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--white);
            color: var(--pink-600);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(255, 45, 117, 0.15);
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            padding: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--pink-300);
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* YouTube Container (Hidden) */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* Responsive Tweaks */
        @media (max-width: 400px) {
            :root {
                --tile-size: 44px;
                --gap: 4px;
            }
            main { padding: 0 10px 20px; }
            .key { min-width: 28px; height: 48px; }
            .controls { top: 10px; right: 10px; }
            .logo { font-size: 28px; }
        }

        @media (max-height: 700px) {
            header { padding-top: 20px; }
            main { gap: 15px; }
            .logo { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="ambient-hearts" id="ambientHearts"></div>

    <div class="controls">
        <div class="streak-badge" id="streakBadge">
            <i data-lucide="flame"></i>
            <span id="streakValue">0</span>
        </div>
        <button class="music-btn" id="musicBtn">
            <i data-lucide="music" id="musicIcon"></i>
            <span id="musicLabel">Music</span>
        </button>
    </div>

    <header>
        <h1 class="logo">Love Wordle <i data-lucide="heart"></i></h1>
        <p class="tagline">5 letters <i data-lucide="star"></i> 6 guesses <i data-lucide="star"></i> 1 heart</p>
    </header>

    <main>
        <div id="grid"></div>
        <div id="keyboard"></div>
    </main>

    <footer>Made with <i data-lucide="heart"></i> for you</footer>

    <div id="toast"></div>

    <div id="modal">
        <div class="modal-card">
            <div class="modal-icon" id="modalIcon">
                <i data-lucide="heart"></i>
            </div>
            <h2 id="modalTitle" class="modal-title">You Win!</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="statStreak">0</div>
                    <div class="stat-label">Current Streak</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statMax">0</div>
                    <div class="stat-label">Max Streak</div>
                </div>
            </div>
            <p id="modalMessage" class="modal-message"></p>
            <button class="modal-btn" id="playAgainBtn" style="display:none">Play Again, Love?</button>
            <div class="modal-countdown" id="countdownContainer">
                Next Love Wordle in: <span id="timeRemaining">--:--:--</span>
            </div>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        // ── WORDS & MESSAGES ─────────────────────────────────────────
        const WORDS = ['lover', 'heart', 'adore', 'crush', 'honey', 'sweet', 'cupid', 'kissy', 'roses', 'tulip', 'bride', 'groom', 'dates', 'faith', 'dream', 'grace', 'peace'];
        const WIN_MESSAGES = [
            "You found the word… just like I found you 💖",
            "Every guess led to you, my favorite answer 💕",
            "I love you more than all the correct guesses combined 🥺",
            "You're as perfect as that final guess, my love 🌸",
            "That word was always meant to be yours 💫"
        ];
        const LOSE_MESSAGES = [
            "It's okay, love… you'll always be my favorite guess 💗",
            "Don't worry, my heart still belongs to you 🌷",
            "Even without the answer, you're everything to me 🥀"
        ];

        // ── STATE ───────────────────────────────────────────────────
        let targetWord = '';
        let currentRow = 0;
        let currentCol = 0;
        let currentGuess = [];
        let gameOver = false;
        let gridTiles = [];
        let keyMap = {};
        
        // ── LOCAL STORAGE KEYS ────────────────────────────────────────
        const STORAGE_KEY_STATS = 'LOVE_WORDLE_STATS';
        const STORAGE_KEY_STATE = 'LOVE_WORDLE_STATE';

        function getStats() {
            const defaults = { streak: 0, maxStreak: 0, lastWon: null, lastPlayed: null };
            const stored = localStorage.getItem(STORAGE_KEY_STATS);
            return stored ? JSON.parse(stored) : defaults;
        }

        function saveStats(stats) {
            localStorage.setItem(STORAGE_KEY_STATS, JSON.stringify(stats));
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        function getDaysSinceEpoch() {
            return Math.floor(Date.now() / (1000 * 60 * 60 * 24));
        }

        // ── INIT ────────────────────────────────────────────────────
        function init() {
            const today = getTodayString();
            const days = getDaysSinceEpoch();
            targetWord = WORDS[days % WORDS.length];
            
            currentRow = 0;
            currentCol = 0;
            currentGuess = [];
            gameOver = false;
            gridTiles = [];
            keyMap = {};

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 0; r < 6; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                gridTiles[r] = [];
                for (let c = 0; c < 5; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.innerHTML = `
                        <div class="tile-inner">
                            <div class="tile-front"></div>
                            <div class="tile-back"></div>
                        </div>`;
                    rowDiv.appendChild(tile);
                    gridTiles[r][c] = tile;
                }
                grid.appendChild(rowDiv);
            }

            buildKeyboard();
            updateStreakDisplay();
            
            // Load Saved State or Check Lock
            const stats = getStats();
            const savedState = localStorage.getItem(STORAGE_KEY_STATE);
            
            if (stats.lastPlayed === today) {
                if (savedState) {
                    const state = JSON.parse(savedState);
                    restoreState(state);
                    if (state.status !== 'playing') {
                        gameOver = true;
                        showModal(state.status === 'win');
                    }
                } else {
                    // Fallback: If played but no state, assume finished (edge case)
                    gameOver = true;
                    showModal(true);
                }
            } else if (savedState) {
                // If the state is from a previous day, clear it
                const state = JSON.parse(savedState);
                if (state.date !== today) {
                    localStorage.removeItem(STORAGE_KEY_STATE);
                }
            }

            hideModal();
            lucide.createIcons();
            startCountdown();
        }

        function updateStreakDisplay() {
            const stats = getStats();
            document.getElementById('streakValue').textContent = stats.streak;
        }

        function restoreState(state) {
            state.guesses.forEach((guess, r) => {
                const result = getResult(guess, targetWord);
                currentRow = r;
                guess.split('').forEach((char, c) => {
                    const tile = gridTiles[r][c];
                    const front = tile.querySelector('.tile-front');
                    const back = tile.querySelector('.tile-back');
                    front.textContent = char;
                    back.textContent = char;
                    back.className = `tile-back ${result[c]}`;
                    tile.classList.add('flipped');
                    
                    // Update keyboard
                    const status = result[c];
                    const keyBtn = keyMap[char];
                    if (keyBtn) {
                        if (status === 'correct') keyBtn.className = 'key correct';
                        else if (status === 'present' && !keyBtn.classList.contains('correct')) keyBtn.className = 'key present';
                        else if (status === 'absent' && !keyBtn.classList.contains('correct') && !keyBtn.classList.contains('present')) keyBtn.className = 'key absent';
                    }
                });
            });
            currentRow = state.status === 'playing' ? state.guesses.length : state.guesses.length - 1;
        }

        function saveGameState(status = 'playing') {
            const today = getTodayString();
            const guesses = [];
            for (let r = 0; r <= currentRow; r++) {
                const rowChars = [];
                for (let c = 0; c < 5; c++) {
                    const text = gridTiles[r][c].querySelector('.tile-front').textContent;
                    if (text) rowChars.push(text);
                }
                if (rowChars.length === 5) guesses.push(rowChars.join(''));
            }
            
            const state = {
                date: today,
                guesses: guesses,
                status: status
            };
            localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(state));
        }

        function buildKeyboard() {
            const kbRows = [
                ['q','w','e','r','t','y','u','i','o','p'],
                ['a','s','d','f','g','h','j','k','l'],
                ['Enter','z','x','c','v','b','n','m','backspace']
            ];
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            kbRows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                row.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key' + (key.length > 1 ? ' wide' : '');
                    if (key === 'backspace') {
                        btn.innerHTML = '<i data-lucide="delete"></i>';
                    } else {
                        btn.textContent = key;
                    }
                    btn.addEventListener('click', () => handleInput(key));
                    rowDiv.appendChild(btn);
                    if (key.length === 1) keyMap[key] = btn;
                });
                kb.appendChild(rowDiv);
            });
        }

        function handleInput(key) {
            if (gameOver) return;
            const keyLower = key.toLowerCase();
            if (keyLower === 'backspace' || keyLower === 'delete') {
                if (currentCol > 0) {
                    currentCol--;
                    currentGuess.pop();
                    const tile = gridTiles[currentRow][currentCol].querySelector('.tile-front');
                    tile.textContent = '';
                    tile.classList.remove('filled');
                }
            } else if (keyLower === 'enter') {
                if (currentCol === 5) {
                    submitGuess();
                } else {
                    showToast('Too short!', 'alert-circle');
                }
            } else if (/^[a-z]$/.test(keyLower) && currentCol < 5) {
                currentGuess.push(keyLower);
                const tile = gridTiles[currentRow][currentCol].querySelector('.tile-front');
                tile.textContent = keyLower;
                tile.classList.add('filled');
                currentCol++;
            }
        }

        function submitGuess() {
            const guess = currentGuess.join('');
            const result = getResult(guess, targetWord);
            
            result.forEach((status, i) => {
                setTimeout(() => {
                    const tile = gridTiles[currentRow][i];
                    const back = tile.querySelector('.tile-back');
                    back.textContent = guess[i];
                    back.className = `tile-back ${status}`;
                    tile.classList.add('flipped');

                    // Update keyboard
                    const keyBtn = keyMap[guess[i]];
                    if (keyBtn) {
                        if (status === 'correct') keyBtn.className = 'key correct';
                        else if (status === 'present' && !keyBtn.classList.contains('correct')) keyBtn.className = 'key present';
                        else if (status === 'absent' && !keyBtn.classList.contains('correct') && !keyBtn.classList.contains('present')) keyBtn.className = 'key absent';
                    }

                    if (i === 4) {
                        setTimeout(() => checkGameState(guess === targetWord), 500);
                    }
                }, i * 150);
            });
        }

        function getResult(guess, target) {
            const res = Array(5).fill('absent');
            const targetChars = target.split('');
            const guessChars = guess.split('');

            guessChars.forEach((char, i) => {
                if (char === targetChars[i]) {
                    res[i] = 'correct';
                    targetChars[i] = null;
                    guessChars[i] = null;
                }
            });

            guessChars.forEach((char, i) => {
                if (char && targetChars.includes(char)) {
                    res[i] = 'present';
                    targetChars[targetChars.indexOf(char)] = null;
                }
            });

            return res;
        }

        function checkGameState(isWin) {
            const today = getTodayString();
            const stats = getStats();
            
            if (isWin) {
                gameOver = true;
                // Update Stats
                stats.streak++;
                if (stats.streak > stats.maxStreak) stats.maxStreak = stats.streak;
                stats.lastWon = today;
                stats.lastPlayed = today;
                saveStats(stats);
                saveGameState('win');
                updateStreakDisplay();
                showModal(true);
            } else if (currentRow === 5) {
                gameOver = true;
                stats.streak = 0; // Reset streak on loss
                stats.lastPlayed = today;
                saveStats(stats);
                saveGameState('loss');
                updateStreakDisplay();
                showModal(false);
            } else {
                currentRow++;
                currentCol = 0;
                currentGuess = [];
                saveGameState('playing');
            }
        }

        function showToast(msg, icon = 'heart') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i data-lucide="${icon}"></i> <span>${msg}</span>`;
            lucide.createIcons();
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showModal(win) {
            const modal = document.getElementById('modal');
            const iconDiv = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const stats = getStats();

            iconDiv.innerHTML = win ? '<i data-lucide="party-popper"></i>' : '<i data-lucide="frown"></i>';
            title.textContent = win ? 'You Found It!' : 'Oh No, Love...';
            msg.textContent = win ? 
                WIN_MESSAGES[Math.floor(Math.random() * WIN_MESSAGES.length)] : 
                `${LOSE_MESSAGES[Math.floor(Math.random() * LOSE_MESSAGES.length)]} Today's word was ${targetWord.toUpperCase()}.`;

            document.getElementById('statStreak').textContent = stats.streak;
            document.getElementById('statMax').textContent = stats.maxStreak;

            modal.classList.add('show');
            lucide.createIcons();
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function startCountdown() {
            const timeSpan = document.getElementById('timeRemaining');
            function update() {
                const now = new Date();
                const nextDay = new Date();
                nextDay.setHours(24, 0, 0, 0);
                const diff = nextDay - now;
                
                const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const m = Math.floor((diff / (1000 * 60)) % 60).toString().padStart(2, '0');
                const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                
                timeSpan.textContent = `${h}:${m}:${s}`;
            }
            setInterval(update, 1000);
            update();
        }

        document.addEventListener('keydown', (e) => handleInput(e.key));

        // ── YOUTUBE MUSIC INTEGRATION ─────────────────────────────────
        let player;
        let playerReady = false;

        // Load YT API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'vAZYVeZ11FE',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'loop': 1,
                    'playlist': 'vAZYVeZ11FE'
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            playerReady = true;
        }

        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false;

        musicBtn.onclick = () => {
            if (!playerReady) return;
            
            if (musicPlaying) {
                player.pauseVideo();
                musicPlaying = false;
                document.getElementById('musicIcon').setAttribute('data-lucide', 'music');
                document.getElementById('musicLabel').textContent = 'Music';
            } else {
                player.playVideo();
                musicPlaying = true;
                document.getElementById('musicIcon').setAttribute('data-lucide', 'pause');
                document.getElementById('musicLabel').textContent = 'Pause';
            }
            musicBtn.classList.toggle('playing', musicPlaying);
            lucide.createIcons();
        };

        // ── AMBIENT HEARTS ───────────────────────────────────────────
        function createAmbientHearts() {
            const container = document.getElementById('ambientHearts');
            const icons = ['heart', 'sparkle', 'star'];
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                const icon = icons[Math.floor(Math.random() * icons.length)];
                span.innerHTML = `<i data-lucide="${icon}"></i>`;
                span.style.setProperty('--x', Math.random() * 100 + '%');
                span.style.setProperty('--delay', Math.random() * 10 + 's');
                span.style.setProperty('--dur', Math.random() * 5 + 10 + 's');
                span.style.setProperty('--size', Math.random() * 15 + 15 + 'px');
                span.style.setProperty('--blur', Math.random() * 2 + 'px');
                container.appendChild(span);
            }
            lucide.createIcons();
        }

        init();
        createAmbientHearts();
    </script>
</body>
</html>
